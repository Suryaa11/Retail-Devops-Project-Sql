apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: retail-route
  namespace: fitness-ns
spec:
  parentRefs:
    name: surya-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixPath
              replacePrefixPath: /
      backendRefs:
        - name: capsule-service
          port: 80