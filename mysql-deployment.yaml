apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: fitness-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpassword"
        - name: MYSQL_DATABASE
          value: "capsule_db"
        - name: MYSQL_USER
          value: "capsule_user"
        - name: MYSQL_PASSWORD
          value: "capsule_password"
      #   volumeMounts:
      #   - name: mysql-storage
      #     mountPath: /var/lib/mysql
      # volumes:
      # - name: mysql-storage
      #   emptyDir: {}
        volumeMounts:
          - mountPath: /var/lib/mysql
            name: mysql-data
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: retail-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: fitness-ns
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
